name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: bandit
        run: bandit -r app evals -c pyproject.toml

  pip-audit:
    name: pip-audit (known CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      - name: Audit dependency declarations
        run: |
          pip-audit --strict \
            -r app/local_extractor/requirements.txt \
            -r app/mcp_extractor/requirements.txt \
            -r app/multi_agent_extractor/requirements.txt \
            -r evals/requirements.txt

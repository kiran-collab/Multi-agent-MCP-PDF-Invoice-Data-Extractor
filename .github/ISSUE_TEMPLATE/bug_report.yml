name: Bug report
description: Report a problem with an app or the eval harness
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - app/local_extractor
        - app/mcp_extractor
        - app/multi_agent_extractor
        - evals/
        - tooling / CI
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands/inputs. Redact any secrets.
      placeholder: |
        1. ...
        2. ...
        3. see error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and relevant package versions.
      placeholder: "macOS 14 · Python 3.12 · pydantic 2.12 · ..."
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
    validations:
      required: false
